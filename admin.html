<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - OreBooking</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- 🔥 Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body bg-light">

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <img src="logos/orebooking.png" alt="Logo" class="logo-img" style="height: 40px;">
        <span class="font-bold">Admin Panel</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="switchTab('dashboard')"><i class="ph ph-squares-four"></i> الإحصائيات</button>
        <button class="nav-item" onclick="switchTab('add-property')"><i class="ph ph-house-line"></i> إضافة عقار جديد</button>
        <button class="nav-item" onclick="switchTab('bookings')"><i class="ph ph-calendar-check"></i> الحجوزات</button>
        <a href="index.html" class="nav-item" style="margin-top: auto; color: var(--text-muted);"><i class="ph ph-arrow-square-out"></i> العودة للموقع</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <h2 id="page-title" class="font-bold">نظرة عامة</h2>
        <div class="admin-profile">
          <span class="font-medium">المدير</span>
          <div class="avatar"><i class="ph-fill ph-user"></i></div>
        </div>
      </header>

      <div class="admin-content">
        
        <!-- Tab 1: Dashboard -->
        <div id="tab-dashboard" class="tab-pane active">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon" style="background: #dcfce7; color: #059669;"><i class="ph-fill ph-house"></i></div>
              <div class="stat-info">
                <h3>إجمالي العقارات</h3>
                <p id="total-props">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: #fef08a; color: #b45309;"><i class="ph-fill ph-calendar"></i></div>
              <div class="stat-info">
                <h3>الحجوزات الجديدة</h3>
                <p>0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: #dbeafe; color: #1d4ed8;"><i class="ph-fill ph-users"></i></div>
              <div class="stat-info">
                <h3>العملاء</h3>
                <p>0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab 2: Add Property -->
        <div id="tab-add-property" class="tab-pane">
          <div class="admin-card">
            <h3 class="font-bold" style="margin-bottom: 24px;">إدخال تفاصيل العقار الجديد</h3>
            
            <form id="add-property-form" class="admin-form">
              <div class="form-grid">
                <div class="input-group">
                  <label>اسم العقار (عربي)</label>
                  <input type="text" id="prop-title-ar" required placeholder="مثال: منتجع الرمال الذهبية">
                </div>
                <div class="input-group">
                  <label>اسم العقار (إنجليزي)</label>
                  <input type="text" id="prop-title-en" required placeholder="Ex: Golden Sands Resort">
                </div>
                <div class="input-group">
                  <label>الموقع (عربي)</label>
                  <input type="text" id="prop-loc-ar" required placeholder="مثال: الجزائر، العاصمة">
                </div>
                <div class="input-group">
                  <label>الموقع (إنجليزي)</label>
                  <input type="text" id="prop-loc-en" required placeholder="Ex: Algiers, Algeria">
                </div>
                <div class="input-group">
                  <label>السعر لليلة (DZD)</label>
                  <input type="number" id="prop-price" required placeholder="مثال: 12000">
                </div>
                <div class="input-group">
                  <label>الصورة الرئيسية للعقار</label>
                  <input type="file" id="prop-image" accept="image/*" required>
                  <small id="upload-status" class="text-primary"></small>
                </div>
              </div>

              <div class="input-group" style="margin-top: 20px;">
                <label>الوصف (عربي)</label>
                <textarea id="prop-desc-ar" rows="3" required placeholder="اكتب وصفاً جذاباً للمكان..."></textarea>
              </div>

              <div class="input-group">
                <label>الوصف (إنجليزي)</label>
                <textarea id="prop-desc-en" rows="3" required placeholder="Write an attractive description..."></textarea>
              </div>

              <button type="submit" class="primary-btn mt-4" id="submit-prop-btn">
                <i class="ph ph-plus-circle"></i> إضافة ونشر العقار
              </button>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
