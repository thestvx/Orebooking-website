<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OreBooking - Sign In / Sign Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- 🔥 Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #435abf;
      --primary-hover: #3448a8;
      --bg:            #f5f6fa;
      --surface:       #ffffff;
      --border:        #e2e5f0;
      --text:          #1a1d2e;
      --text-muted:    #6b7280;
      --input-bg:      #f9fafb;
      --input-focus:   #eef0fc;
      --error:         #ef4444;
      --success:       #10b981;
      --radius:        14px;
      --radius-sm:     8px;
      --shadow:        0 8px 40px rgba(67,90,191,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --transition:    0.22s cubic-bezier(0.4,0,0.2,1);
      --font-en:       'Poppins', sans-serif;
      --font-ar:       'Tajawal', sans-serif;
    }

    body.dark {
      --bg:         #0f1117;
      --surface:    #1a1d2e;
      --border:     #2a2d40;
      --text:       #e8eaf6;
      --text-muted: #9198b5;
      --input-bg:   #13162a;
      --input-focus:#1e2245;
      --shadow:     0 8px 40px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    }

    html[lang="ar"] body,
    html[dir="rtl"] body { font-family: var(--font-ar); }
    html[lang="en"] body,
    html[dir="ltr"] body { font-family: var(--font-en); }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background var(--transition), color var(--transition);
      font-family: var(--font-en);
    }

    /* ============================================================
       FLOATING CONTROLS
    ============================================================ */
    .auth-controls {
      position: fixed;
      top: 20px;
      inset-inline-end: 20px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .icon-btn:hover { background: var(--input-focus); border-color: var(--primary); color: var(--primary); }

    .lang-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .lang-btn:hover { background: var(--input-focus); border-color: var(--primary); color: var(--primary); }

    /* ============================================================
       AUTH CARD
    ============================================================ */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: background var(--transition), box-shadow var(--transition);
    }

    /* Logo Header */
    .auth-header {
      padding: 32px 40px 0;
      display: flex;
      justify-content: center;
    }

    .auth-logo-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--primary);
    }
    .auth-logo-link i { font-size: 1.8rem; }
    .auth-logo-link span {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    /* Auth Body */
    .auth-body-inner {
      padding: 28px 40px 36px;
    }

    /* ============================================================
       FORMS
    ============================================================ */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* Input Groups */
    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
    }

    .input-group input::placeholder { color: var(--text-muted); opacity: 0.7; }

    .input-group input:focus {
      border-color: var(--primary);
      background: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(67,90,191,0.12);
    }

    /* Input with icon wrapper */
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap i {
      position: absolute;
      top: 50%;
      inset-inline-start: 14px;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition);
    }
    .input-icon-wrap input {
      padding-inline-start: 42px;
    }
    .input-icon-wrap input:focus ~ i,
    .input-icon-wrap:focus-within i { color: var(--primary); }

    /* Password toggle */
    .pass-toggle {
      position: absolute;
      top: 50%;
      inset-inline-end: 14px;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 0;
      transition: color var(--transition);
      display: flex;
      align-items: center;
    }
    .pass-toggle:hover { color: var(--primary); }

    /* Auth Options Row */
    .auth-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      margin-top: -4px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      user-select: none;
    }
    .checkbox-container input[type="checkbox"] { display: none; }
    .checkmark {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .checkbox-container input:checked + .checkmark {
      background: var(--primary);
      border-color: var(--primary);
    }
    .checkbox-container input:checked + .checkmark::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .forgot-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: opacity var(--transition);
    }
    .forgot-link:hover { opacity: 0.75; }

    /* Primary Button */
    .primary-btn {
      width: 100%;
      height: 50px;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.2px;
    }
    .primary-btn:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(67,90,191,0.3);
    }
    .primary-btn:active:not(:disabled) { transform: translateY(0); }
    .primary-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Social Buttons */
    .social-logins {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .social-btn {
      height: 46px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }
    .social-btn:hover {
      border-color: var(--primary);
      background: var(--input-focus);
    }
    .social-btn i { font-size: 1.15rem; }

    /* Switch Form */
    .switch-form-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .switch-form-text a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      margin-inline-start: 4px;
    }
    .switch-form-text a:hover { text-decoration: underline; }

    /* Auth Message */
    .auth-message {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .auth-message.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
      display: flex;
    }
    .auth-message.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
      display: flex;
    }
    body.dark .auth-message.error   { background: #2a1515; border-color: #7f1d1d; }
    body.dark .auth-message.success { background: #0f2a1f; border-color: #14532d; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 480px) {
      .auth-header    { padding: 24px 24px 0; }
      .auth-body-inner { padding: 22px 24px 28px; }
      .auth-title      { font-size: 1.3rem; }
      .social-logins   { grid-template-columns: 1fr; }
    }

    /* spin animation for loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    .ph-spin { animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body>

  <!-- Floating Controls -->
  <div class="auth-controls">
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
      <i class="ph ph-moon"></i>
    </button>
    <button id="lang-toggle" class="lang-btn">العربية</button>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-header">
      <a href="index.html" class="auth-logo-link">
        <i class="ph-fill ph-house-line"></i>
        <span>OreBooking</span>
      </a>
    </div>

    <div class="auth-body-inner">

      <!-- Auth Message (errors/success) -->
      <div id="auth-message" class="auth-message"></div>

      <!-- ====== Login Form ====== -->
      <form id="login-form" class="auth-form active">
        <h2 class="auth-title font-bold" data-i18n="welcome_back">Welcome back</h2>
        <p class="auth-subtitle" data-i18n="login_desc">Enter your details to access your account.</p>

        <div class="input-group">
          <label data-i18n="email">EMAIL</label>
          <div class="input-icon-wrap">
            <input type="email" id="login-email"
                   placeholder="name@example.com" required autocomplete="email">
            <i class="ph ph-envelope"></i>
          </div>
        </div>

        <div class="input-group">
          <label data-i18n="password">PASSWORD</label>
          <div class="input-icon-wrap">
            <input type="password" id="login-password"
                   placeholder="••••••••" required autocomplete="current-password">
            <i class="ph ph-lock"></i>
            <button type="button" class="pass-toggle" onclick="togglePass('login-password', this)">
              <i class="ph ph-eye"></i>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="checkbox-container">
            <input type="checkbox" id="remember-me">
            <span class="checkmark"></span>
            <span data-i18n="remember_me">Remember me</span>
          </label>
          <a href="#" class="forgot-link" data-i18n="forgot_pass">Forgot password?</a>
        </div>

        <button type="submit" class="primary-btn" id="login-btn">
          <span data-i18n="sign_in">Sign In</span>
        </button>

        <div class="auth-divider">
          <span data-i18n="or_continue">or continue with</span>
        </div>

        <div class="social-logins">
          <button type="button" class="social-btn" id="google-btn">
            <i class="ph-fill ph-google-logo" style="color:#ea4335;"></i>
            Google
          </button>
          <button type="button" class="social-btn">
            <i class="ph-fill ph-apple-logo"></i>
            Apple
          </button>
        </div>

        <p class="switch-form-text">
          <span data-i18n="no_account">Don't have an account?</span>
          <a href="#" id="go-to-register" data-i18n="sign_up">Sign up</a>
        </p>
      </form>

      <!-- ====== Register Form ====== -->
      <form id="register-form" class="auth-form">
        <h2 class="auth-title font-bold" data-i18n="create_account">Create an account</h2>
        <p class="auth-subtitle" data-i18n="register_desc">Join OreBooking to unlock premium features.</p>

        <div class="input-group">
          <label data-i18n="full_name">FULL NAME</label>
          <div class="input-icon-wrap">
            <input type="text" id="reg-name"
                   placeholder="John Doe" required autocomplete="name">
            <i class="ph ph-user"></i>
          </div>
        </div>

        <div class="input-group">
          <label data-i18n="email">EMAIL</label>
          <div class="input-icon-wrap">
            <input type="email" id="reg-email"
                   placeholder="name@example.com" required autocomplete="email">
            <i class="ph ph-envelope"></i>
          </div>
        </div>

        <div class="input-group">
          <label data-i18n="password">PASSWORD</label>
          <div class="input-icon-wrap">
            <input type="password" id="reg-password"
                   placeholder="••••••••" required autocomplete="new-password">
            <i class="ph ph-lock"></i>
            <button type="button" class="pass-toggle" onclick="togglePass('reg-password', this)">
              <i class="ph ph-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="primary-btn" id="register-btn">
          <span data-i18n="sign_up_btn">Create Account</span>
        </button>

        <p class="switch-form-text">
          <span data-i18n="has_account">Already have an account?</span>
          <a href="#" id="go-to-login" data-i18n="sign_in">Sign In</a>
        </p>
      </form>

    </div><!-- /auth-body-inner -->
  </div><!-- /auth-card -->

  <script src="auth.js"></script>

  <script>
    // ── Password visibility toggle ──
    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ph ph-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'ph ph-eye';
      }
    }
  </script>

</body>
</html>
