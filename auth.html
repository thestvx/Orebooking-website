<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OreBooking - Sign In / Sign Up</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <!-- Floating Controls (Lang & Theme) -->
  <div class="auth-controls">
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
      <i class="ph ph-moon"></i>
    </button>
    <button id="lang-toggle" class="lang-btn font-medium">العربية</button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      
      <!-- Card Header -->
      <div class="auth-header">
        <a href="index.html" class="logo" style="justify-content: center; text-decoration: none;">
          <i class="ph-fill ph-house-line"></i>
          <span class="font-bold">OreBooking</span>
        </a>
      </div>

      <div class="auth-content">
        <!-- Login Form -->
        <form id="login-form" class="auth-form active" onsubmit="event.preventDefault();">
          <h2 class="font-bold auth-title" data-i18n="welcome_back">Welcome back</h2>
          <p class="auth-subtitle" data-i18n="login_desc">Enter your details to access your account.</p>

          <div class="input-group">
            <label class="font-medium" data-i18n="email">Email</label>
            <input type="email" placeholder="name@example.com" required>
          </div>

          <div class="input-group">
            <label class="font-medium" data-i18n="password">Password</label>
            <input type="password" placeholder="••••••••" required>
          </div>

          <div class="auth-options">
            <label class="checkbox-container">
              <input type="checkbox">
              <span class="checkmark"></span>
              <span class="font-medium" data-i18n="remember_me">Remember me</span>
            </label>
            <a href="#" class="forgot-link font-medium" data-i18n="forgot_pass">Forgot password?</a>
          </div>

          <button class="primary-btn font-medium" data-i18n="sign_in">Sign In</button>

          <div class="auth-divider">
            <span data-i18n="or_continue">or continue with</span>
          </div>

          <div class="social-logins">
            <button type="button" class="social-btn">
              <i class="ph-fill ph-google-logo" style="color: #ea4335;"></i> Google
            </button>
            <button type="button" class="social-btn">
              <i class="ph-fill ph-apple-logo"></i> Apple
            </button>
          </div>

          <p class="switch-form-text">
            <span data-i18n="no_account">Don't have an account?</span> 
            <a href="#" id="go-to-register" class="font-bold text-primary" data-i18n="sign_up">Sign up</a>
          </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" onsubmit="event.preventDefault();">
          <h2 class="font-bold auth-title" data-i18n="create_account">Create an account</h2>
          <p class="auth-subtitle" data-i18n="register_desc">Join OreBooking to unlock premium features.</p>

          <div class="input-group">
            <label class="font-medium" data-i18n="full_name">Full Name</label>
            <input type="text" placeholder="John Doe" required>
          </div>

          <div class="input-group">
            <label class="font-medium" data-i18n="email">Email</label>
            <input type="email" placeholder="name@example.com" required>
          </div>

          <div class="input-group">
            <label class="font-medium" data-i18n="password">Password</label>
            <input type="password" placeholder="••••••••" required>
          </div>

          <button class="primary-btn font-medium" data-i18n="sign_up_btn">Create Account</button>

          <p class="switch-form-text mt-4">
            <span data-i18n="has_account">Already have an account?</span> 
            <a href="#" id="go-to-login" class="font-bold text-primary" data-i18n="sign_in">Sign in</a>
          </p>
        </form>
      </div>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
