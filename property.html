<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Details - OreBooking</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- 🔥 Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar inner-nav">
    <a href="index.html" class="back-btn font-medium">
      <i class="ph ph-arrow-left"></i>
      <span data-i18n="back_home">Back to Home</span>
    </a>
    
    <a href="index.html" class="logo">
      <img src="logos/orebooking.png" id="main-logo" alt="OreBooking Logo" class="logo-img">
    </a>
    
    <div class="nav-actions" style="margin-inline-start: auto;">
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
        <i class="ph ph-moon"></i>
      </button>
      <button id="lang-toggle" class="lang-btn font-medium">العربية</button>
      
      <!-- Profile Dropdown -->
      <div class="profile-container">
        <button id="open-auth-btn" class="profile-menu">
          <i class="ph ph-user"></i>
        </button>
        <div id="profile-dropdown" class="profile-dropdown">
          <div class="dropdown-header">
            <span class="font-bold" id="dropdown-user-name">User Name</span>
            <span class="text-muted text-sm" id="dropdown-user-email">user@email.com</span>
          </div>
          <div class="dropdown-body">
            <a href="index.html?view=favorites" class="dropdown-item" style="text-decoration: none;">
              <i class="ph ph-heart"></i>
              <span data-i18n="my_favorites">My Favorites</span>
            </a>
            <button class="dropdown-item text-danger" id="logout-btn">
              <i class="ph ph-sign-out"></i>
              <span data-i18n="logout">Log Out</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container property-container">
    <div class="prop-header">
      <h1 class="prop-title font-bold" id="prop-title">Loading...</h1>
      <div class="prop-meta">
        <div class="prop-rating"><i class="ph-fill ph-star"></i> <span id="prop-rating">0.0</span></div>
        <div class="prop-location"><i class="ph ph-map-pin"></i> <span id="prop-location">Location</span></div>
      </div>
    </div>

    <!-- 🖼️ Image Gallery (Smooth Horizontal Slide) -->
    <div class="prop-image-gallery" id="gallery-container">
      <div class="slider-container">
        <!-- Prev Button -->
        <button class="slider-btn prev-btn" onclick="prevSlide(event)"><i class="ph ph-caret-left"></i></button>
        
        <!-- Track that holds all images side by side -->
        <div class="slider-track" id="slider-track">
          <!-- Images will be injected here dynamically by JS -->
        </div>
        
        <!-- Next Button -->
        <button class="slider-btn next-btn" onclick="nextSlide(event)"><i class="ph ph-caret-right"></i></button>
        
        <!-- Dots -->
        <div class="slider-dots-container" id="slider-dots"></div>
      </div>
    </div>

    <div class="prop-content-grid">
      <!-- Info Details -->
      <div class="prop-details">
        <h2 class="font-bold" data-i18n="about_prop">About this space</h2>
        <p class="prop-description" id="prop-desc">Loading description...</p>
        
        <div class="prop-features">
          <h3 class="font-bold" data-i18n="what_offers">What this place offers</h3>
          <ul class="features-list" id="prop-features"></ul>
        </div>
      </div>

      <!-- Booking Card -->
      <div class="prop-booking-card">
        <div class="booking-price">
          <span class="price-val" id="prop-price">0 DZD</span> <span class="text-muted text-sm">/ <span data-i18n="night">night</span></span>
        </div>
        
        <div class="booking-inputs">
          <div class="input-row">
            <div class="input-half">
              <label class="text-sm font-bold">CHECK-IN</label>
              <input type="date" id="checkin-date">
            </div>
            <div class="input-half border-left">
              <label class="text-sm font-bold">CHECKOUT</label>
              <input type="date" id="checkout-date">
            </div>
          </div>
        </div>

        <button class="primary-btn font-bold mt-4" id="book-now-btn" data-i18n="book_now">Reserve Now</button>
        <p class="text-center text-sm text-muted mt-3" data-i18n="wont_charged">You won't be charged yet</p>
      </div>
    </div>
  </main>

  <!-- 🔍 Lightbox for Zoom -->
  <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
    <!-- Close Button -->
    <button class="close-lightbox"><i class="ph ph-x"></i></button>
    
    <!-- Prev Button for Lightbox -->
    <button class="lightbox-btn prev-btn" onclick="prevSlide(event)"><i class="ph ph-caret-left"></i></button>
    
    <div class="lightbox-img-wrapper">
      <img src="" id="lightbox-img" class="lightbox-img" onclick="toggleZoom(event)" title="Click to Zoom">
    </div>

    <!-- Next Button for Lightbox -->
    <button class="lightbox-btn next-btn" onclick="nextSlide(event)"><i class="ph ph-caret-right"></i></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
